<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lecture</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #fff; color: #111; line-height: 1.6; }
    a { color: inherit; text-decoration: none; }
    .wrap { max-width: 680px; margin: 0 auto; padding: 48px 24px; }
    .back { font-size: 13px; color: #999; display: inline-block; margin-bottom: 32px; }
    .back:hover { color: #000; }
    h1 { font-size: 22px; font-weight: 600; letter-spacing: -.4px; margin-bottom: 8px; }
    .date { font-size: 12px; color: #bbb; margin-bottom: 20px; }
    .yt-btn { display: inline-flex; align-items: center; gap: 6px; font-size: 13px;
              padding: 7px 14px; border: 1px solid #e0e0e0; border-radius: 7px;
              margin-bottom: 28px; transition: border-color .15s; }
    .yt-btn:hover { border-color: #000; }
    .summary { font-size: 15px; color: #444; margin-bottom: 28px;
               padding-bottom: 28px; border-bottom: 1px solid #f0f0f0; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 32px; }
    .tag  { font-size: 12px; background: #f2f2f2; border-radius: 4px; padding: 3px 8px; color: #666; }
    .section-label { font-size: 11px; font-weight: 600; letter-spacing: .6px;
                     text-transform: uppercase; color: #aaa; margin-bottom: 12px; }
    .points { list-style: none; margin-bottom: 36px; display: flex; flex-direction: column; gap: 8px; }
    .points li { font-size: 14px; padding-left: 16px; position: relative; }
    .points li::before { content: "—"; position: absolute; left: 0; color: #ccc; }
    .transcript { font-size: 14px; color: #333; white-space: pre-wrap; line-height: 1.9; }
    .ts { font-size: 11px; color: #bbb; font-variant-numeric: tabular-nums; margin-right: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="/">← All lectures</a>
    <div id="content"></div>
  </div>
  <script>
    const id = location.pathname.split('/').pop();
    async function load() {
      const res = await fetch(`/api/lectures/${id}`);
      if (!res.ok) { document.getElementById('content').innerHTML = '<p style="color:#bbb">Lecture not found.</p>'; return; }
      const l = await res.json();
      document.title = l.title;
      document.getElementById('content').innerHTML = `
        <h1>${l.title}</h1>
        ${l.published ? `<p class="date">${new Date(l.published).toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'})}</p>` : ''}
        ${l.url ? `<a class="yt-btn" href="${l.url}" target="_blank" rel="noopener">▶ Watch on YouTube</a>` : ''}
        <p class="summary">${l.summary || ''}</p>
        <div class="tags">${(l.tags || []).map(t => `<span class="tag">${t}</span>`).join('')}</div>
        <p class="section-label">Key Points</p>
        <ul class="points">${(l.key_points || []).map(p => `<li>${p}</li>`).join('')}</ul>
        <p class="section-label">Transcript</p>
        <div class="transcript">${formatTranscript(l.transcript || '')}</div>`;
    }
    function formatTranscript(text) {
      // Highlight [HH:MM:SS] timestamps
      return text.replace(/\[(\d{2}:\d{2}(?::\d{2})?)\]/g,
        '<span class="ts">[$1]</span>');
    }
    load();
  </script>
</body>
</html>
